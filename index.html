<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Brain — Authorize</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F6F5F0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px; width: 100%; max-width: 400px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: #1a1a1a; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none;
    }
    input:focus { border-color: #378ADD; }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: #1a1a1a; color: white; margin-bottom: 8px; }
    .btn-deny { background: transparent; color: #888; border: 1px solid #ddd; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #error { background: #FCEBEB; border: 1px solid #F09595; color: #791F1F; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .info { background: #E6F1FB; border: 1px solid #85B7EB; color: #0C447C; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
    #status { text-align: center; padding: 20px; color: #888; font-size: 14px; display: none; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>Open Brain To-Do</h1>
    <p class="subtitle">Authorize Claude to access your tasks</p>
    <div class="info">Claude is requesting access to your To-Do list. Sign in to approve.</div>
    <div id="error"></div>
    <div id="status"></div>
    <div id="form-container">
      <label>EMAIL</label>
      <input type="email" id="email" required autofocus>
      <label>PASSWORD</label>
      <input type="password" id="password" required>
      <button class="btn btn-primary" id="approve-btn" onclick="handleApprove()">Sign in &amp; Approve</button>
      <button class="btn btn-deny" id="deny-btn" onclick="handleDeny()">Deny</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var SUPABASE_URL = 'https://nxirjlemmfnptwacnagh.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54aXJqbGVtbWZucHR3YWNuYWdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzQ4NzIsImV4cCI6MjA4OTYxMDg3Mn0.bW2vL4yFTnqdyhglYHDqxjOHw4EkYwxVGJo6RLr_kIY';

    var params = new URLSearchParams(window.location.search);
    var authorizationId = params.get('authorization_id');

    var _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    if (!authorizationId) {
      document.getElementById('error').textContent = 'Missing authorization_id.';
      document.getElementById('error').style.display = 'block';
      document.getElementById('form-container').style.display = 'none';
    }

    function showError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
      document.getElementById('status').style.display = 'none';
      document.getElementById('form-container').style.display = 'block';
      document.getElementById('approve-btn').disabled = false;
      document.getElementById('deny-btn').disabled = false;
    }

    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
      document.getElementById('status').style.display = 'block';
      document.getElementById('form-container').style.display = 'none';
      document.getElementById('error').style.display = 'none';
    }

    async function handleApprove() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('approve-btn').disabled = true;
      document.getElementById('deny-btn').disabled = true;

      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter email and password.');
        return;
      }

      showStatus('Signing in...');

      // Sign in
      var signInResult = await _supabase.auth.signInWithPassword({ email: email, password: password });
      console.log('signIn error:', signInResult.error);
      console.log('signIn session:', signInResult.data?.session ? 'exists' : 'null');
      console.log('signIn access_token:', signInResult.data?.session?.access_token ? signInResult.data.session.access_token.substring(0, 20) + '...' : 'none');

      if (signInResult.error) {
        showError('Sign in failed: ' + signInResult.error.message);
        return;
      }

      // Verify session is actually set
      var sessionCheck = await _supabase.auth.getSession();
      console.log('getSession after signIn:', sessionCheck.data?.session ? 'exists' : 'null');
      console.log('getSession token:', sessionCheck.data?.session?.access_token ? sessionCheck.data.session.access_token.substring(0, 20) + '...' : 'none');

      if (!sessionCheck.data?.session) {
        showError('Session not established after sign-in. This may be a cross-domain issue.');
        return;
      }

      showStatus('Approving...');

      // Approve via direct API call (bypasses JS client version mismatch)
      var token = signInResult.data.session.access_token;
      try {
        var approveResp = await fetch(SUPABASE_URL + '/auth/v1/oauth/authorizations/' + authorizationId, {
          method: 'PUT',
          headers: {
            'Authorization': 'Bearer ' + token,
            'apikey': SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ approved: true }),
        });

        console.log('approve status:', approveResp.status);
        console.log('approve redirected:', approveResp.redirected);
        console.log('approve url:', approveResp.url);

        // If the response redirected, follow it
        if (approveResp.redirected) {
          console.log('Following redirect to:', approveResp.url);
          window.location.href = approveResp.url;
          return;
        }

        var approveText = await approveResp.text();
        console.log('approve body:', approveText);

        if (approveText) {
          try {
            var approveData = JSON.parse(approveText);
            if (approveData.redirect_to) {
              window.location.href = approveData.redirect_to;
              return;
            }
            if (!approveResp.ok) {
              showError('Approve failed: ' + (approveData.message || approveData.error_description || JSON.stringify(approveData)));
              return;
            }
          } catch(e) {
            // Not JSON — might be redirect HTML
            console.log('Response not JSON');
          }
        }

        // If status is 200/201 but no redirect, check the DB
        if (approveResp.ok) {
          showStatus('Approved! Waiting for redirect...');
          // Give it a moment then show success
          setTimeout(function() {
            document.getElementById('card').innerHTML = '<h1>Authorized</h1><p class="subtitle">Check Claude — the connection should be active.</p>';
          }, 3000);
          return;
        }

        showError('Approve failed with status ' + approveResp.status);
      } catch (err) {
        showError('Approve failed: ' + err.message);
      }
    }

    async function handleDeny() {
      document.getElementById('approve-btn').disabled = true;
      document.getElementById('deny-btn').disabled = true;

      var denyResult = await _supabase.auth.oauth.denyAuthorization(authorizationId);
      console.log('deny result:', denyResult);

      if (denyResult.data && denyResult.data.redirect_to) {
        window.location.href = denyResult.data.redirect_to;
        return;
      }

      document.getElementById('card').innerHTML = '<h1>Access Denied</h1><p class="subtitle">You can close this window.</p>';
    }
  </script>
</body>
</html>
